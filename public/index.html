<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同济大学地图</title>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    #map { width: 100%; height: 100%; }
    .top-btn {
      position: fixed; bottom: 24px; right: 12px; z-index: 10;
      background: #fff; color: #333; border: 1px solid #ddd;
      padding: 8px 16px; border-radius: 4px; cursor: pointer;
      font-size: 13px; text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    .top-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <div id="map"></div>
  <a class="top-btn" style="left:12px;right:auto" href="https://github.com/rain-in-everywhere/YTJ-Map" target="_blank">📂 仓库</a>
  <a class="top-btn" href="/editor.html">✏️ 编辑器</a>
  <script src="assets/js/tj-map.js"></script>
  <script>
    TJMap.init({
      container: 'map',
      center: [121.5012, 31.2825],
      zoom: 15.5,
      pmtilesUrl: '/tiles/tongji.pmtiles',
      maxBounds: [[121.48, 31.27], [121.52, 31.295]]
    });
  </script>
</body>
</html>
